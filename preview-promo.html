<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lume — Sedi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#070707; --line:rgba(255,255,255,.10); }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:#fff;font-family:Inter,system-ui,sans-serif;overflow:hidden;
    background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(196,0,66,.12),transparent 70%)}

  .brand{position:fixed;top:22px;left:26px;z-index:30;display:flex;align-items:center;gap:10px;pointer-events:none}
  .brand .logo{width:30px;height:30px;border-radius:50%;border:1.5px solid #C40042;display:flex;align-items:center;justify-content:center}
  .brand .logo i{width:3px;height:14px;background:#C40042;display:block;border-radius:2px}
  .brand .wm{font-family:"Space Grotesk";font-weight:700;letter-spacing:.04em;font-size:18px}
  .brand .wm b{color:#C40042}
  .brand .wm span{color:rgba(255,255,255,.5);font-weight:400;font-size:12px;margin-left:4px}
  .hint{position:fixed;top:26px;right:26px;z-index:30;font-size:12.5px;color:rgba(255,255,255,.4);letter-spacing:.02em}

  .stage{height:100vh;width:100vw;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
    gap:14px;padding:74px 14px 14px;
    transition:grid-template-columns .65s cubic-bezier(.65,0,.35,1),grid-template-rows .65s cubic-bezier(.65,0,.35,1)}

  .tile{position:relative;border-radius:26px;overflow:hidden;cursor:pointer;border:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:flex-end;padding:30px;min-width:0;min-height:0;
    background:radial-gradient(130% 90% at 80% -10%,var(--accent-glow),transparent 55%),linear-gradient(160deg,#191919,#0c0c0c);
    transition:border-color .5s ease,box-shadow .5s ease,transform .5s ease}
  .tile:hover{border-color:var(--accent-line)}
  .tile.active{border-color:var(--accent-line);box-shadow:0 40px 90px -40px var(--accent-soft)}
  .tile.dim{opacity:.62}

  .num{position:absolute;top:-6px;right:20px;font-family:"Space Grotesk";font-weight:700;font-size:180px;
    line-height:1;color:#fff;opacity:.05;pointer-events:none}
  .status{position:absolute;top:24px;left:30px;display:inline-flex;align-items:center;gap:7px;font-size:11px;
    font-weight:600;letter-spacing:.09em;text-transform:uppercase;padding:6px 13px;border-radius:999px;
    background:var(--accent-chip);color:var(--accent);border:1px solid var(--accent-line)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}

  .ico{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    margin-bottom:16px;color:var(--accent);background:var(--accent-chip);border:1px solid var(--accent-line);flex:none}
  .cat{font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
  .name{font-family:"Space Grotesk";font-weight:700;font-size:clamp(24px,2.4vw,36px);line-height:1.05}
  .cue{margin-top:14px;display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:#fff;opacity:.85}
  .cue .pl{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#0a0a0a;display:flex;align-items:center;justify-content:center;transition:transform .3s ease}
  .tile:hover .cue .pl{transform:scale(1.08)}
  .tile.active .cue{display:none}

  .detail{max-height:0;opacity:0;overflow:hidden;transition:max-height .6s ease,opacity .45s ease;margin-top:0}
  .tile.active .detail{max-height:520px;opacity:1;margin-top:22px;transition:max-height .7s ease,opacity .5s ease .2s}
  .feats{display:grid;grid-template-columns:1fr 1fr;gap:11px 22px;margin-bottom:20px}
  .feats li{list-style:none;display:flex;gap:10px;align-items:flex-start;font-size:14px;color:rgba(255,255,255,.85)}
  .ck{flex:none;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--accent-chip);color:var(--accent);border:1px solid var(--accent-line);margin-top:1px}
  .meta{display:flex;flex-direction:column;gap:9px;padding-top:16px;border-top:1px solid var(--line);font-size:13px;color:rgba(255,255,255,.6)}
  .meta .row{display:flex;gap:10px;align-items:center}
  .meta .row svg{color:var(--accent);flex:none}
  .cta{margin-top:16px;align-self:flex-start;display:inline-flex;align-items:center;gap:9px;padding:13px 22px;
    border-radius:999px;font-weight:600;font-size:14px;color:#0a0a0a;background:var(--accent);text-decoration:none;transition:transform .2s ease}
  .cta:hover{transform:scale(1.04)}
  .close{position:absolute;top:22px;right:24px;z-index:5;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--line);background:rgba(0,0,0,.35);color:#fff;cursor:pointer;display:none;
    align-items:center;justify-content:center;backdrop-filter:blur(6px)}
  .tile.active .close{display:flex}

  @media(max-width:820px){
    body{overflow:auto}
    .stage{height:auto;min-height:100vh;grid-template-columns:1fr!important;grid-template-rows:none!important;padding:70px 12px 12px}
    .tile{min-height:200px}
    .tile.active{min-height:auto}
    .feats{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="brand"><span class="logo"><i></i></span><span class="wm"><b>LUME</b><span>FITNESS</span></span></div>
  <div class="hint">Scegli la tua sede</div>
  <div class="stage" id="stage"></div>
<script>
var I={
  dumbbell:'<svg viewBox="0 0 24 24" width="27" height="27" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M6 5v2M6 17v2M18 7v10M18 5v2M18 17v2M3 9v6M21 9v6M6 12h12"/></svg>',
  pin:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
  clock:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  phone:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.4 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>',
  check:'<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
  plus:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  x:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'
};
var CLUBS=[
  {n:"01",cat:"Flagship Club",name:"Lume Macerata",status:"Aperto",accent:"crimson",addr:"Piazzale Mario Fattorini 1, 62100 Macerata",hours:"Lun-Ven 06:30-22:30 - Sab 08:00-20:00 - Dom 09:00-14:00",phone:"+39 0733 123456",cta:["Scopri Macerata","#"],feat:["Gym Floor 500m2 Technogym","Box CrossFit 450m2","Sala Reformer Pilates","Piscina & Acqua Fitness","Sale Fitness Les Mills","Scuola Nuoto Bambini"]},
  {n:"02",cat:"Club",name:"Lume Montecassiano",status:"Aperto",accent:"crimson",addr:"Via Sergio Piermanni 3, 62010 Montecassiano",hours:"Lun-Ven 07:00-22:00 - Sab 08:30-19:00 - Dom chiuso",phone:"+39 0733 654321",cta:["Scopri Montecassiano","#"],feat:["Sala pesi attrezzata","Corsi di gruppo","Piscina & Scuola Nuoto","Spogliatoi moderni","Parcheggio gratuito"]},
  {n:"03",cat:"Apertura 2026",name:"Lume Piediripa",status:"Apertura 2026",accent:"amber",addr:"Macerata - Zona Piediripa",hours:"Apertura prevista 2026",phone:"Iscriviti agli aggiornamenti",cta:["Resta aggiornato","#"],feat:["Gym Floor di nuova generazione","Sala corsi panoramica","Piscina semi-olimpionica","Area functional & cardio","Ampio parcheggio"]},
  {n:"04",cat:"Apertura 2026",name:"Lume Centro",status:"Apertura 2026",accent:"amber",addr:"Macerata - Centro Storico",hours:"Apertura prevista 2026",phone:"Iscriviti agli aggiornamenti",cta:["Resta aggiornato","#"],feat:["Boutique gym nel cuore della citta","Box CrossFit dedicato","Studio Reformer Pilates","Personal training su misura","Lounge & recovery zone"]}
];
var ACC={
  crimson:{c:"#C40042",glow:"rgba(196,0,66,.22)",soft:"rgba(196,0,66,.5)",chip:"rgba(196,0,66,.14)",line:"rgba(196,0,66,.5)"},
  amber:{c:"#f5a623",glow:"rgba(245,166,35,.18)",soft:"rgba(245,166,35,.45)",chip:"rgba(245,166,35,.13)",line:"rgba(245,166,35,.46)"}
};
var stage=document.getElementById('stage');
var active=null, tiles=[];
CLUBS.forEach(function(club,i){
  var a=ACC[club.accent];
  var t=document.createElement('div');
  t.className='tile';
  t.style.setProperty('--accent',a.c);
  t.style.setProperty('--accent-glow',a.glow);
  t.style.setProperty('--accent-soft',a.soft);
  t.style.setProperty('--accent-chip',a.chip);
  t.style.setProperty('--accent-line',a.line);
  var feats=club.feat.map(function(f){return '<li><span class="ck">'+I.check+'</span>'+f+'</li>';}).join('');
  var h='<span class="num">'+club.n+'</span>';
  h+='<span class="status"><span class="dot"></span>'+club.status+'</span>';
  h+='<button class="close" aria-label="Chiudi">'+I.x+'</button>';
  h+='<div class="ico">'+I.dumbbell+'</div>';
  h+='<div class="cat">'+club.cat+'</div>';
  h+='<div class="name">'+club.name+'</div>';
  h+='<div class="cue">Scopri il club <span class="pl">'+I.plus+'</span></div>';
  h+='<div class="detail"><ul class="feats">'+feats+'</ul>';
  h+='<div class="meta"><span class="row">'+I.pin+club.addr+'</span><span class="row">'+I.clock+club.hours+'</span><span class="row">'+I.phone+club.phone+'</span></div>';
  h+='<a class="cta" href="'+club.cta[1]+'">'+club.cta[0]+' '+I.arrow+'</a></div>';
  t.innerHTML=h;
  stage.appendChild(t);
  tiles.push(t);
  t.addEventListener('click',function(){ select(active===i?null:i); });
  t.querySelector('.close').addEventListener('click',function(e){e.stopPropagation();select(null);});
  t.querySelector('.cta').addEventListener('click',function(e){e.stopPropagation();});
});
function select(idx){
  active=idx;
  if(idx===null){
    stage.style.gridTemplateColumns='1fr 1fr';
    stage.style.gridTemplateRows='1fr 1fr';
  }else{
    var col=idx%2, row=Math.floor(idx/2);
    stage.style.gridTemplateColumns=col===0?'2.3fr 1fr':'1fr 2.3fr';
    stage.style.gridTemplateRows=row===0?'2.3fr 1fr':'1fr 2.3fr';
  }
  tiles.forEach(function(t,j){
    t.classList.toggle('active',j===idx);
    t.classList.toggle('dim',idx!==null&&j!==idx);
  });
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')select(null);});
</script>
</body>
</html>
